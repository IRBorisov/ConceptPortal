name: Frontend CI

on:
  push:
    branches: ["main"]
    paths:
      - rsconcept/frontend/**
      - rsconcept/backend/**
      - rsconcept/domain/**
      - package.json
      - pnpm-lock.yaml
      - pnpm-workspace.yaml
      - .github/workflows/frontend.yml
  pull_request:
    branches: ["main"]
    paths:
      - rsconcept/frontend/**
      - rsconcept/backend/**
      - rsconcept/domain/**
      - package.json
      - pnpm-lock.yaml
      - pnpm-workspace.yaml
      - .github/workflows/frontend.yml

permissions:
  contents: read
  actions: write

jobs:
  build:
    runs-on: ubuntu-22.04

    strategy:
      matrix:
        node-version: [24.x]

    steps:
      - uses: actions/checkout@v5
      - uses: pnpm/action-setup@v4
      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v5
        with:
          node-version: ${{ matrix.node-version }}
          cache: pnpm
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Build domain
        run: pnpm --filter @rsconcept/domain run build
      - name: Build frontend
        run: pnpm --filter frontend run build
      - name: Install Playwright browsers
        working-directory: rsconcept/frontend
        run: pnpm exec playwright install --with-deps
      - name: Lint
        run: pnpm --filter frontend run lint
      - name: Unit tests
        run: pnpm --filter frontend test
      - name: E2E tests
        run: pnpm --filter frontend run test:e2e:ci
      - uses: actions/upload-artifact@v6
        if: ${{ !cancelled() }}
        with:
          name: playwright-report
          path: rsconcept/frontend/playwright-report/
          if-no-files-found: ignore
          retention-days: 30
  notify-failure:
    permissions: {}
    runs-on: ubuntu-latest
    needs: build
    if: failure()
    steps:
      - name: Send Telegram Notification
        run: |
          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
          -d chat_id=${{ secrets.TELEGRAM_CHAT_ID }} \
          -d text="❌ Front build failed! Repository: ${{ github.repository }} Commit: ${{ github.sha }}"
