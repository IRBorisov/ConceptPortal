# Build, typecheck, lint, and test the frontend Vite app + Playwright e2e.
# Runs from the monorepo root so npm workspaces resolve @rsconcept/domain locally.

name: Frontend CI

on:
  push:
    branches: ["main"]
    paths:
      - rsconcept/frontend/**
      - rsconcept/backend/**
      - rsconcept/domain/**
      - package.json
      - package-lock.json
      - .github/workflows/frontend.yml
  pull_request:
    branches: ["main"]
    paths:
      - rsconcept/frontend/**
      - rsconcept/backend/**
      - rsconcept/domain/**
      - package.json
      - package-lock.json
      - .github/workflows/frontend.yml

permissions:
  contents: read
  actions: write

jobs:
  build:
    runs-on: ubuntu-22.04

    strategy:
      matrix:
        node-version: [22.x]

    steps:
      - uses: actions/checkout@v4
      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache-dependency-path: package-lock.json
          cache: "npm"
      - name: Install workspaces (root)
        run: npm ci
      - name: Build domain
        run: npm run build -w @rsconcept/domain
      - name: Build frontend
        working-directory: rsconcept/frontend
        run: npm run build --if-present
      - name: Install Playwright browsers
        working-directory: rsconcept/frontend
        run: npx playwright install --with-deps
      - name: Lint
        working-directory: rsconcept/frontend
        run: npm run lint
      - name: Unit tests
        working-directory: rsconcept/frontend
        run: npm test
      - name: E2E tests
        working-directory: rsconcept/frontend
        run: npm run test:e2e:ci
      - uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          name: playwright-report
          path: rsconcept/frontend/playwright-report/
          retention-days: 30
  notify-failure:
    permissions: {}
    runs-on: ubuntu-latest
    needs: build
    if: failure()
    steps:
      - name: Send Telegram Notification
        run: |
          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
          -d chat_id=${{ secrets.TELEGRAM_CHAT_ID }} \
          -d text="❌ Front build failed! Repository: ${{ github.repository }} Commit: ${{ github.sha }}"
