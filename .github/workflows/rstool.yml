name: RSTool CI

on:
  push:
    branches: ["main"]
    paths:
      - rsconcept/rstool/**
      - rsconcept/domain/**
      - package.json
      - pnpm-lock.yaml
      - pnpm-workspace.yaml
      - .npmrc
      - .github/workflows/rstool.yml
  pull_request:
    branches: ["main"]
    paths:
      - rsconcept/rstool/**
      - rsconcept/domain/**
      - package.json
      - pnpm-lock.yaml
      - pnpm-workspace.yaml
      - .npmrc
      - .github/workflows/rstool.yml

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-22.04

    strategy:
      matrix:
        node-version: [24.x]

    steps:
      - uses: actions/checkout@v5
      - uses: pnpm/action-setup@v4
      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v5
        with:
          node-version: ${{ matrix.node-version }}
          cache: pnpm
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Build domain
        run: pnpm --filter @rsconcept/domain run build
      - name: Typecheck rstool
        run: pnpm --filter @rsconcept/rstool run typecheck
      - name: Test rstool
        run: pnpm --filter @rsconcept/rstool test
      - name: Build rstool
        run: pnpm --filter @rsconcept/rstool run build
  notify-failure:
    permissions: {}
    runs-on: ubuntu-latest
    needs: build
    if: failure()
    steps:
      - name: Send Telegram Notification
        run: |
          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
          -d chat_id=${{ secrets.TELEGRAM_CHAT_ID }} \
          -d text="❌ RSTool build failed! Repository: ${{ github.repository }} Commit: ${{ github.sha }}"
