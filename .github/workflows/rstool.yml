name: RSTool CI

defaults:
  run:
    working-directory: rsconcept/rstool

on:
  push:
    branches: ["main"]
    paths:
      - rsconcept/rstool/**
      - rsconcept/frontend/**
      - .github/workflows/rstool.yml
  pull_request:
    branches: ["main"]
    paths:
      - rsconcept/rstool/**
      - rsconcept/frontend/**
      - .github/workflows/rstool.yml

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-22.04

    strategy:
      matrix:
        node-version: [22.x]

    steps:
      - uses: actions/checkout@v4
      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: "npm"
          cache-dependency-path: |
            rsconcept/frontend/package-lock.json
            rsconcept/rstool/package-lock.json
      - name: Install frontend dependencies
        working-directory: rsconcept/frontend
        run: npm ci
      - name: Install rstool dependencies
        run: npm ci
      - name: Typecheck
        run: npm run typecheck
      - name: Run tests
        run: npm test
  notify-failure:
    permissions: {}
    runs-on: ubuntu-latest
    needs: build
    if: failure()
    defaults:
      run:
        working-directory: .
    steps:
      - name: Send Telegram Notification
        run: |
          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
          -d chat_id=${{ secrets.TELEGRAM_CHAT_ID }} \
          -d text="❌ RSTool build failed! Repository: ${{ github.repository }} Commit: ${{ github.sha }}"
