name: RSTool CI

on:
  push:
    branches: ["main"]
    paths:
      - rsconcept/rstool/**
      - rsconcept/domain/**
      - .github/workflows/rstool.yml
  pull_request:
    branches: ["main"]
    paths:
      - rsconcept/rstool/**
      - rsconcept/domain/**
      - .github/workflows/rstool.yml

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-22.04

    strategy:
      matrix:
        node-version: [24.x]

    steps:
      - uses: actions/checkout@v5
      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v5
        with:
          node-version: ${{ matrix.node-version }}
          cache: "npm"
          cache-dependency-path: rsconcept/rstool/package-lock.json
      - name: Install dependencies
        working-directory: rsconcept/rstool
        run: npm ci
      - name: Typecheck rstool
        working-directory: rsconcept/rstool
        run: npm run typecheck
      - name: Test rstool
        working-directory: rsconcept/rstool
        run: npm test
      - name: Build rstool
        working-directory: rsconcept/rstool
        run: npm run build
  notify-failure:
    permissions: {}
    runs-on: ubuntu-latest
    needs: build
    if: failure()
    steps:
      - name: Send Telegram Notification
        run: |
          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
          -d chat_id=${{ secrets.TELEGRAM_CHAT_ID }} \
          -d text="❌ RSTool build failed! Repository: ${{ github.repository }} Commit: ${{ github.sha }}"
