name: RSTool CI

on:
  push:
    branches: ["main"]
    paths:
      - rsconcept/rstool/**
      - rsconcept/domain/**
      - package.json
      - package-lock.json
      - .github/workflows/rstool.yml
  pull_request:
    branches: ["main"]
    paths:
      - rsconcept/rstool/**
      - rsconcept/domain/**
      - package.json
      - package-lock.json
      - .github/workflows/rstool.yml

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-22.04

    strategy:
      matrix:
        node-version: [24.x]

    steps:
      - uses: actions/checkout@v4
      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: "npm"
          cache-dependency-path: package-lock.json
      - name: Install workspaces (root)
        run: npm ci
      - name: Typecheck rstool
        run: npm run typecheck -w @rsconcept/rstool
      - name: Test rstool
        run: npm test -w @rsconcept/rstool
      - name: Build rstool
        run: npm run build -w @rsconcept/rstool
  notify-failure:
    permissions: {}
    runs-on: ubuntu-latest
    needs: build
    if: failure()
    steps:
      - name: Send Telegram Notification
        run: |
          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
          -d chat_id=${{ secrets.TELEGRAM_CHAT_ID }} \
          -d text="❌ RSTool build failed! Repository: ${{ github.repository }} Commit: ${{ github.sha }}"
