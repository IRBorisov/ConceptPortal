<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#000000" />
    <meta
      name="description"
      content="Концептуализация предметных областей. Библиотека концептуальных схем и моделей. Операционные схемы синтеза. Моделирование сложных систем управления"
    />
    <meta name="google-site-verification" content="bodB0xvBD_xM-VHg7EgfTf87jEMBF1DriZKdrZjwW1k" />
    <meta name="yandex-verification" content="2b1f1f721cd6b66a" />

    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
    <meta http-equiv="Pragma" content="no-cache" />
    <meta http-equiv="Expires" content="0" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      rel="preload"
      as="style"
      href="https://fonts.googleapis.com/css2?family=Rubik:ital,wght@0,400;0,500;0,600;1,400;1,600&family=Fira+Code:wght@400;500;600&family=Noto+Sans+Math&family=Noto+Sans+Symbols+2&family=Alegreya+Sans+SC:wght@400;700&family=Noto+Color+Emoji&display=swap"
      onload="
        this.onload = null;
        this.rel = 'stylesheet';
      "
    />

    <title>Концепт Портал</title>
  </head>
  <body>
    <div id="root"></div>
    <script>
      try {
        const preferencesStorageKey = 'portal.preferences';
        const supportedLocales = new Set(['ru', 'en', 'fr']);
        const storedEnvelope = JSON.parse(localStorage.getItem(preferencesStorageKey) || '{}');
        const storedState =
          storedEnvelope && typeof storedEnvelope === 'object' && storedEnvelope.state && typeof storedEnvelope.state === 'object'
            ? storedEnvelope.state
            : {};
        const currentPathname = window.location.pathname;
        const pathParts = currentPathname.split('/');
        const localeFromPath = pathParts[1];

        if (supportedLocales.has(localeFromPath)) {
          const normalizedPath = `/${pathParts.slice(2).join('/')}`.replace(/\/+$/, '') || '/';
          history.replaceState(history.state, '', `${normalizedPath}${window.location.search}${window.location.hash}`);
          storedState.locale = localeFromPath;
          localStorage.setItem(
            preferencesStorageKey,
            JSON.stringify({
              ...(storedEnvelope && typeof storedEnvelope === 'object' ? storedEnvelope : {}),
              state: storedState
            })
          );
          document.documentElement.setAttribute('lang', localeFromPath);
        } else if (typeof storedState.locale === 'string' && supportedLocales.has(storedState.locale)) {
          document.documentElement.setAttribute('lang', storedState.locale);
        }

        const preferences = storedState;
        const isDark = preferences ? preferences.darkMode : window.matchMedia('(prefers-color-scheme: dark)').matches;
        if (isDark) {
          document.documentElement.classList.add('dark');
        } else {
          document.documentElement.classList.remove('dark');
        }
        document.documentElement.setAttribute('data-color-scheme', isDark ? 'dark' : 'light');
      } catch (e) {}
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
