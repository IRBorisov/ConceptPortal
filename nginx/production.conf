upstream innerdjango {
    server backend:8000;
}

upstream innerreact {
    server frontend:3000;
}

limit_req_zone $binary_remote_addr zone=sentry_tunnel:10m rate=10r/s;

# Catch-all: drop requests with an unknown/empty Host (raw-IP access, vulnerability scanners).
# Prevents these from reaching Django and generating DisallowedHost noise in Sentry.
server {
    listen 80 default_server;
    listen [::]:80 default_server;

    server_name _;
    server_tokens off;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 444;
    }
}

server {
    listen 443 ssl http2 default_server;
    listen [::]:443 ssl http2 default_server;

    server_name _;
    server_tokens off;

    ssl_certificate /etc/nginx/ssl/live/api.portal.acconcept.ru/fullchain.pem;
    ssl_certificate_key /etc/nginx/ssl/live/api.portal.acconcept.ru/privkey.pem;

    return 444;
}

server {
    listen 80;
    listen [::]:80;

    server_name api.portal.acconcept.ru www.api.portal.acconcept.ru;
    server_tokens off;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://api.portal.acconcept.ru$request_uri;
    }
}

server {
    listen 80;
    listen [::]:80;

    server_name portal.acconcept.ru www.portal.acconcept.ru;
    server_tokens off;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://portal.acconcept.ru$request_uri;
    }
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;

    ssl_certificate /etc/nginx/ssl/live/api.portal.acconcept.ru/fullchain.pem;
    ssl_certificate_key /etc/nginx/ssl/live/api.portal.acconcept.ru/privkey.pem;
    server_name api.portal.acconcept.ru www.api.portal.acconcept.ru;

    location / {
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header Host $host;
        proxy_pass http://innerdjango;
        proxy_redirect default;
    }
    location /static/ {
        alias /var/www/static/;
    }
    location /media/ {
        alias /var/www/media/;
   }
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;

    ssl_certificate /etc/nginx/ssl/live/portal.acconcept.ru/fullchain.pem;
    ssl_certificate_key /etc/nginx/ssl/live/portal.acconcept.ru/privkey.pem;
    server_name portal.acconcept.ru www.portal.acconcept.ru;
    
    location / {
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header Host $host;
        proxy_pass http://innerreact;
        proxy_redirect default;
    }

    location /assets/ {
        proxy_pass http://innerreact/assets/;
        expires 1y;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    # Sentry ingest tunnel — same-origin proxy so browser extensions do not block error reports
    location /sentry-tunnel {
        if ($request_method != POST) {
            return 405;
        }
        client_max_body_size 1m;
        limit_req zone=sentry_tunnel burst=20 nodelay;

        proxy_pass https://o4511545773522944.ingest.de.sentry.io/api/4511545780600912/envelope/;
        proxy_set_header Host o4511545773522944.ingest.de.sentry.io;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_ssl_server_name on;
    }
}